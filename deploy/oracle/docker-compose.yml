# Oracle Cloud deployment for Modmail (this fork) + Logviewer.
#
# - `bot` is built from this repository's Dockerfile so your fork's changes are
#   included, and so the image is native to the host architecture (the Always
#   Free Ampere A1 VM is ARM64 / aarch64).
# - `logviewer` is pulled from the upstream registry. If it fails to start on an
#   ARM VM (manifest/exec format error), see the note in README.md.
# - There is no `mongo` service here: this setup points at your EXISTING database
#   via CONNECTION_URI in .env (your current MongoDB / Atlas URI).

services:
  bot:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: modmail-fork:latest
    container_name: modmail-bot
    restart: always
    env_file:
      - .env

  logviewer:
    # Custom image: upstream logviewer + Apple dark-mode skin (see ./logviewer).
    build:
      context: ./logviewer
    image: modmail-logviewer-apple:latest
    container_name: modmail-logviewer
    restart: always
    env_file:
      - .env
    environment:
      # Logviewer reads MONGO_URI; reuse the same database the bot writes to.
      - MONGO_URI=${CONNECTION_URI}
    # No public port: only the Caddy auth proxy talks to the logviewer, privately
    # over the Docker network at http://logviewer:8000.

  # Discord OAuth2 forward-auth proxy. Verifies the visitor is a member of
  # GUILD_ID holding REQUIRED_ROLE_ID before Caddy lets them reach the logviewer.
  authproxy:
    build:
      context: ./auth
    image: modmail-authproxy:latest
    container_name: modmail-authproxy
    restart: always
    env_file:
      - .env
    depends_on:
      - logviewer

  # Caddy sits in front of the logviewer and runs every request past the auth
  # proxy (Discord role check) before serving it. This is what the tunnel points
  # at. TLS is handled by Cloudflare, so Caddy serves plain HTTP on :8080.
  caddy:
    image: caddy:2-alpine
    container_name: modmail-caddy
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - authproxy
      - logviewer

  # Cloudflare Tunnel: makes an OUTBOUND connection to Cloudflare, so the
  # logviewer is published at your domain with automatic HTTPS and no inbound
  # ports opened. In the Cloudflare dashboard, route your public hostname to
  # the service  http://caddy:8080  (the auth proxy edge, NOT the logviewer).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: modmail-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - caddy
